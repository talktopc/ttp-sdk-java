name: Notion — Log commit

on:
  push:
    branches: ['master', 'main']

jobs:
  log-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Create Done task in Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${{ github.event.head_commit.message }}" \
            --arg url "${{ github.event.head_commit.url }}" \
            --arg notes "Repo: ${{ github.repository }} · Branch: ${{ github.ref_name }}" \
            '{
              parent: { database_id: "e990c2ef-2c63-4972-ba42-963e07e30b85" },
              properties: {
                Task:       { title: [{ text: { content: $msg } }] },
                Status:     { status: { name: "Done" } },
                "PR / Link": { url: $url },
                Notes:      { rich_text: [{ text: { content: $notes } }] }
              }
            }')

          curl -sf -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$PAYLOAD"
